<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>原価管理 | サンズカンパニー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --card:#1a1a24;
  --card2:#21212e;
  --border:#2a2a3a;
  --accent:#f0a500;
  --accent2:#ff6b35;
  --good:#22c55e;
  --warn:#f59e0b;
  --bad:#ef4444;
  --text:#f0f0f8;
  --muted:#7a7a9a;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden;}

/* ── HEADER ── */
#hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
#hdr-logo{width:32px;height:32px;border-radius:8px;object-fit:cover;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;flex-shrink:0;}
#hdr-logo img{width:100%;height:100%;object-fit:cover;}
#hdr-title{font-size:15px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#hdr-save,#hdr-load{background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;}
#hdr-save:active,#hdr-load:active{opacity:.7;}

/* ── BOTTOM NAV ── */
#bnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.bnav-btn{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);font-size:9px;font-family:inherit;transition:color .2s;}
.bnav-btn.active{color:var(--accent);}
.bnav-icon{font-size:20px;line-height:1;}

/* ── MAIN SCROLL ── */
#main{position:fixed;top:56px;left:0;right:0;bottom:60px;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* ── PAGES ── */
.pg{display:none;padding:0 0 16px;}
.pg.active{display:block;}

/* ── STORE GRID ── */
#store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px 16px 16px;}
.store-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;border:2px solid transparent;transition:border-color .2s,transform .15s;box-shadow:0 4px 16px rgba(0,0,0,.3);}
.store-card:active{transform:scale(.95);}
.store-card.sel{border-color:var(--accent);}
.store-thumb{height:80px;display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;background:#fff;}
.store-thumb img{width:auto;height:76px;max-width:calc(100% - 8px);object-fit:contain;}
.store-info{padding:10px 12px 12px;background:var(--card);}
.store-name{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:3px;color:var(--text);}
.store-cnt{font-size:11px;color:var(--accent);font-weight:500;}

/* ── SECTION TITLE ── */
.sec-hd{padding:16px 16px 8px;font-size:18px;font-weight:900;letter-spacing:-.5px;}
.sec-sub{font-size:12px;color:var(--muted);font-weight:400;margin-left:6px;}

/* ── CATEGORY TABS ── */
#cat-bar{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
#cat-bar::-webkit-scrollbar{display:none;}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap;transition:all .15s;}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}

/* ── SEARCH ── */
#search-wrap{padding:0 16px 10px;}
#search-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:14px;font-family:inherit;}
#search-inp:focus{outline:none;border-color:var(--accent);}
#search-inp::placeholder{color:var(--muted);}

/* ── MENU GRID ── */
#menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.menu-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .1s;}
.menu-card:active{transform:scale(.97);}
.mc-img{height:90px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;position:relative;}
.mc-img img{width:100%;height:100%;object-fit:cover;}
.mc-yt{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.7);border-radius:4px;padding:2px 5px;font-size:10px;}
.mc-body{padding:10px;}
.mc-name{font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.3;}
.mc-meta{display:flex;align-items:center;gap:6px;}
.mc-rate{font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;}
.mc-rate.good{background:rgba(34,197,94,.15);color:var(--good);}
.mc-rate.warn{background:rgba(245,158,11,.15);color:var(--warn);}
.mc-rate.bad{background:rgba(239,68,68,.15);color:var(--bad);}
.mc-rate.none{background:var(--card2);color:var(--muted);}
.mc-sell{font-size:12px;color:var(--muted);margin-left:auto;}
.mc-gauge{margin-top:6px;height:3px;background:var(--card2);border-radius:2px;overflow:hidden;}
.mc-gauge-fill{height:100%;border-radius:2px;transition:width .3s;}

/* ── DETAIL SCREEN ── */
#detail-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
#detail-screen.open{transform:translateX(0);}
#det-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
#det-back{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:8px 4px;}
#det-title{flex:1;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#det-edit-btn{background:var(--accent);border:none;color:#000;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.det-img{width:100%;height:200px;object-fit:cover;background:var(--card2);}
.det-img-placeholder{width:100%;height:160px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:64px;}
.det-body{padding:16px;}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:var(--card);border-radius:12px;padding:12px;text-align:center;}
.kpi-val{font-size:20px;font-weight:900;margin-bottom:2px;}
.kpi-lbl{font-size:10px;color:var(--muted);}
.kpi-val.good{color:var(--good);}
.kpi-val.warn{color:var(--warn);}
.kpi-val.bad{color:var(--bad);}
.kpi-val.accent{color:var(--accent);}

/* ── INGREDIENT TABLE ── */
.sec-label{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;margin-top:20px;}
.ing-table{width:100%;border-collapse:collapse;}
.ing-table th{font-size:10px;color:var(--muted);font-weight:500;padding:4px 6px;text-align:left;border-bottom:1px solid var(--border);}
.ing-table td{font-size:12px;padding:8px 6px;border-bottom:1px solid rgba(42,42,58,.5);vertical-align:middle;}
.ing-name-cell{font-weight:500;}
.ing-cost-cell{text-align:right;font-weight:700;color:var(--accent);}
.ing-bar-wrap{height:3px;background:var(--card2);border-radius:2px;overflow:hidden;margin-top:3px;}
.ing-bar-fill{height:100%;background:var(--accent);border-radius:2px;}
.ing-total{padding:10px 6px;display:flex;justify-content:space-between;font-weight:700;}

/* ── STEPS ── */
.steps-wrap{margin-top:4px;}
.step-item{padding:10px 0;border-bottom:1px solid rgba(42,42,58,.5);display:flex;gap:10px;align-items:flex-start;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#000;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-text{font-size:13px;line-height:1.6;color:var(--text);}
.memo-box{background:var(--card);border-radius:10px;padding:12px;font-size:13px;line-height:1.6;color:var(--muted);margin-top:4px;}
.yt-link{display:flex;align-items:center;gap:8px;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.3);border-radius:10px;padding:12px;margin-top:8px;cursor:pointer;text-decoration:none;}
.yt-icon{font-size:20px;}
.yt-text{font-size:13px;color:#ff4444;font-weight:500;}

/* ── EDIT MODAL ── */
#edit-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:300;overflow-y:auto;display:none;}
#edit-modal.open{display:block;}
#edit-wrap{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 16px;margin-top:60px;min-height:calc(100vh - 60px);}
.field-lbl{font-size:11px;color:var(--muted);margin-bottom:4px;margin-top:14px;font-weight:500;}
.field-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;}
.field-inp:focus{outline:none;border-color:var(--accent);}
.field-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;}
.ing-edit-row{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;position:relative;}
.ing-del-btn{position:absolute;top:8px;right:8px;background:rgba(239,68,68,.2);border:none;color:var(--bad);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.btn-add-ing{width:100%;background:var(--card);border:1px dashed var(--border);border-radius:10px;padding:10px;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;margin-top:4px;}
.modal-actions{display:flex;gap:10px;margin-top:20px;padding-bottom:40px;}
.btn-save-menu{flex:1;background:var(--accent);border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;}
.btn-cancel{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:14px;color:var(--muted);cursor:pointer;font-family:inherit;}
.modal-title{font-size:18px;font-weight:900;margin-bottom:4px;}
.ing-calc-preview{font-size:11px;color:var(--accent);margin-top:4px;min-height:16px;}

/* ── MASTER PAGE ── */
.master-item{background:var(--card);border-radius:10px;padding:12px;margin:0 16px 8px;display:flex;align-items:center;gap:10px;}
.mi-name{font-size:14px;font-weight:500;flex:1;}
.mi-detail{font-size:11px;color:var(--muted);text-align:right;}
.mi-price{font-size:13px;font-weight:700;color:var(--accent);text-align:right;}

/* ── FAB ── */
.fab{position:fixed;bottom:74px;right:16px;width:52px;height:52px;border-radius:50%;background:var(--accent);border:none;color:#000;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(240,165,0,.4);z-index:50;}

/* ── MENU TYPE TOGGLE ── */
#menu-type-toggle{display:flex;margin:0 16px 10px;background:var(--card2);border-radius:12px;padding:3px;gap:3px;}
.mtt-btn{flex:1;padding:8px 0;border-radius:9px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;color:var(--muted);background:none;}
.mtt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.4);}
.mtt-btn.active.recipe{color:var(--accent);}
.mtt-btn.active.prepwork{color:#7dd3fc;}

/* ── MARKET AI ── */
.ing-chip{display:inline-flex;align-items:center;padding:10px 16px;border-radius:22px;border:2px solid var(--border);background:var(--card2);font-size:13px;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;min-height:40px;}
.ing-chip.sel{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.ing-chip.sel{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.market-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;}
.market-card-name{font-size:15px;font-weight:700;margin-bottom:10px;}
.price-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(42,42,58,.5);}
.price-row:last-child{border-bottom:none;}
.price-area{font-size:12px;color:var(--muted);}
.price-val{font-size:14px;font-weight:700;}
.price-diff{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:600;}
.diff-up{background:rgba(239,68,68,.15);color:var(--bad);}
.diff-down{background:rgba(34,197,94,.15);color:var(--good);}
.diff-ok{background:rgba(120,120,120,.15);color:var(--muted);}
.alert-badge{display:inline-block;background:rgba(239,68,68,.2);color:var(--bad);border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;margin-left:8px;}
.ok-badge{display:inline-block;background:rgba(34,197,94,.2);color:var(--good);border-radius:8px;padding:3px 8px;font-size:11px;font-weight:700;margin-left:8px;}
.update-btn{background:var(--accent);border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;}
.market-summary{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:12px;padding:14px;margin-bottom:14px;}


#edit-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);}
#edit-screen.open{transform:translateX(0);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.btn-save-menu{background:var(--accent);border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;}
.btn-cancel{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;color:var(--text);cursor:pointer;font-family:inherit;}
.ing-row-edit{background:var(--card);border-radius:10px;padding:10px;margin-bottom:8px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 20px;font-size:13px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:500;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div id="hdr-logo"><span id="hdr-logo-emoji">🍽️</span></div>
  <div id="hdr-title">サンズカンパニー 原価管理</div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
    <button id="hdr-save" onclick="saveJSON()" style="background:var(--accent);border:none;color:#000;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">💾保存</button>
    <div id="sync-badge" style="font-size:9px;color:var(--good);white-space:nowrap">☁️ 接続中…</div>
  </div>
  <label id="hdr-load" style="cursor:pointer">📂読込<input type="file" accept=".json" style="display:none" onchange="loadJSON(event)"></label>
</div>

<!-- MAIN SCROLL -->
<div id="main">

  <!-- PAGE: HOME (STORE SELECT) -->
  <div id="pg-home" class="pg active">
    <!-- ホームバナー -->
    <div style="margin:16px 16px 0;border-radius:16px;overflow:hidden;position:relative;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 40%,#0f3460 70%,#533483 100%);padding:24px 20px 20px;">
      <div style="position:absolute;top:-20px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(240,165,0,.08);"></div>
      <div style="position:absolute;bottom:-30px;left:10px;width:80px;height:80px;border-radius:50%;background:rgba(240,165,0,.05);"></div>
      <div style="font-size:11px;font-weight:600;letter-spacing:2px;color:rgba(240,165,0,.8);margin-bottom:6px">SUN'S COMPANY</div>
      <div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;line-height:1.2">原価管理</div>
      <div style="font-size:12px;color:rgba(255,255,255,.5);margin-top:4px">店舗を選択してください</div>
    </div>
    <div id="store-grid"></div>

    <!-- データ管理パネル -->
    <div id="data-mgmt" style="margin:12px 16px 80px;background:var(--card);border-radius:14px;padding:16px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:12px">🔒 データ管理</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:12px">
        データは<b style="color:var(--accent)">Supabase（クラウド）</b>に自動保存されます。<br>
        スマホ・PC・タブレット、どの端末からでも同じデータが使えます。
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button onclick="saveJSON()" style="flex:1;background:var(--accent);border:none;border-radius:10px;padding:12px 8px;font-size:13px;font-weight:700;color:#000;cursor:pointer;font-family:inherit;min-width:100px">
          💾 バックアップ保存
        </button>
        <button onclick="document.getElementById('file-in').click()" style="flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 8px;font-size:13px;color:var(--text);cursor:pointer;font-family:inherit;min-width:100px">
          📂 バックアップ読込
        </button>
      </div>
      <div id="last-save-info" style="font-size:11px;color:var(--muted);margin-top:10px;text-align:center"></div>
    </div>
  </div>

  <!-- PAGE: LIST (MENU LIST) -->
  <div id="pg-list" class="pg">
    <div style="padding:12px 16px 4px;display:flex;align-items:center;gap:8px;">
      <button onclick="goHome()" style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;">← 戻る</button>
      <span id="list-store-name" style="font-size:15px;font-weight:700;"></span>
    </div>
    <div id="menu-type-toggle">
      <button class="mtt-btn active recipe" id="mtt-recipe" onclick="setMenuType('recipe')">📋 レシピ</button>
      <button class="mtt-btn prepwork" id="mtt-prepwork" onclick="setMenuType('prepwork')">🔪 プリパレ（仕込み）</button>
    </div>
    <div id="cat-bar"></div>
    <div id="search-wrap"><input id="search-inp" placeholder="🔍 メニュー名で検索" oninput="renderMenuGrid()"></div>
    <div id="menu-grid"></div>
  </div>

  <!-- PAGE: MASTER -->
  <div id="pg-master" class="pg">
    <div class="sec-hd">食材マスター <span id="master-cnt" class="sec-sub"></span></div>
    <div id="search-wrap" style="padding:0 16px 12px;"><input id="master-search" placeholder="🔍 食材名・仕入先で検索" oninput="renderMaster()"></div>
    <div id="master-list"></div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div id="bnav">
  <button class="bnav-btn active" id="bnav-home" onclick="showPage('home')">
    <span class="bnav-icon">🏠</span>店舗
  </button>
  <button class="bnav-btn" id="bnav-master" onclick="showPage('master')">
    <span class="bnav-icon">🛒</span>食材
  </button>
  <button class="bnav-btn" id="bnav-market" onclick="showPage('market')">
    <span class="bnav-icon">📊</span>市場AI
  </button>
</div>

  <!-- PAGE: MARKET AI -->
  <div id="pg-market" class="pg">
    <div style="padding:16px 16px 0">
      <!-- ヘッダー -->
      <div style="background:linear-gradient(135deg,#0f3460,#533483);border-radius:14px;padding:18px 16px;margin-bottom:14px;position:relative;overflow:hidden">
        <div style="position:absolute;top:-15px;right:-15px;width:80px;height:80px;border-radius:50%;background:rgba(240,165,0,.1)"></div>
        <div style="font-size:11px;letter-spacing:2px;color:rgba(240,165,0,.8);margin-bottom:4px">AI MARKET CHECK</div>

function toast(msg){
  try{
    var t=document.getElementById('toast');
    if(!t){ console.log('[toast]',msg); return; }
    t.textContent=msg; t.classList.add('show');
    clearTimeout(t._tid);
    t._tid=setTimeout(function(){t.classList.remove('show');},3000);
  }catch(e){ console.log('[toast]',msg); }
}


// ── 画像をSupabase Storageにアップロード ──
async function uploadMenuImg(menuId, file){
  if(!sbClient||!file) return null;
  var ext=(file.name||'img').split('.').pop()||'jpg';
  var path='menus/'+String(menuId)+'_'+Date.now()+'.'+ext;
  var res=await sbClient.storage.from('genka-images').upload(path,file,{upsert:true,contentType:file.type});
  if(res.error){console.error('upload error:',res.error);return null;}
  return sbClient.storage.from('genka-images').getPublicUrl(path).data.publicUrl;
}


function setSyncStatus(status){
  try{
    var el=document.getElementById('sync-badge'); if(!el) return;
    var map={ok:{text:'☁️ 同期済み',color:'var(--good)'},syncing:{text:'🔄 同期中…',color:'var(--warn)'},error:{text:'⚠️ オフライン',color:'var(--bad)'},loading:{text:'📡 読込中…',color:'var(--muted)'}};
    var s=map[status]||map.ok; el.textContent=s.text; el.style.color=s.color;
  }catch(e){}
}

let menus  = JSON.parse(localStorage.getItem('genka_v8_menus')  || 'null') || DEFAULT_MENUS;
let ingMaster = JSON.parse(localStorage.getItem('genka_v8_ings') || 'null') || DEFAULT_INGS;

// マイグレーション: v7→v8
(function(){
  var v7m = localStorage.getItem('genka_v7_menus');
  if(v7m && !localStorage.getItem('genka_v8_menus')){
    try{
      var old = JSON.parse(v7m);
      if(old && old.length > 0){
        var names = menus.map(function(m){return m.name;});
        var toAdd = old.filter(function(m){return names.indexOf(m.name)<0;});
        if(toAdd.length>0) menus = menus.concat(toAdd);
        save();
      }
    }catch(e){}
  }
  // s3補完
  var s3cnt = menus.filter(function(m){return m.storeId==='s3';}).length;
  if(s3cnt < 38){
    var defS3 = DEFAULT_MENUS.filter(function(m){return m.storeId==='s3';});
    var names = menus.map(function(m){return m.name;});
    var toAdd = defS3.filter(function(m){return names.indexOf(m.name)<0;});
    if(toAdd.length>0){ menus = menus.concat(toAdd); save(); }
  }
})();

function save(){
  // ① localStorageに即時保存（オフラインでも安全）
  localStorage.setItem('genka_v8_menus',  JSON.stringify(menus));
  localStorage.setItem('genka_v8_ings',   JSON.stringify(ingMaster));
  localStorage.setItem('genka_v8_stores', JSON.stringify(stores));
  // ② Supabaseに非同期でバックグラウンド同期
  syncToSupabase();
}

function syncToSupabase(){
  if(!sbClient){ setSyncStatus('error'); return; }
  if(syncPending) return;
  syncPending = true;
  setSyncStatus('syncing');

  // メニューをupsert
  var menuRows = menus.map(function(m){
    return {
      id: String(m.id), store_id: m.storeId||'', name: m.name||'',
      cat: m.cat||'', menu_type: m.menuType||'recipe',
      sell: parseFloat(m.sell)||0, cost: parseFloat(m.cost)||0, rate: parseFloat(m.rate)||0,
      steps: m.steps||'', prepwork: m.prepwork||'', yt_link: m.ytLink||'',
      memo: m.memo||'', img: m.img||'',
      ings: m.ings||[], recipe_imgs: m.recipeImgs||[], step_imgs: m.stepImgs||[],
      updated_at: new Date().toISOString()
    };
  });
  // 食材をupsert
  var ingRows = ingMaster.map(function(ing){
    return {
      name: ing.name||'', supplier: ing.supplier||'', unit: ing.unit||'g',
      p_qty: ing.pQty||'', p_price: ing.pPrice||'', loss_rate: ing.lossRate||'',
      updated_at: new Date().toISOString()
    };
  });
  // 店舗をupsert（logoは重いので除外して別途）
  var storeRows = stores.map(function(s){
    return { id: s.id, name: s.name||'', color: s.color||'#f0a500', updated_at: new Date().toISOString() };
  });

  Promise.all([
    sbClient.from('genka_menus').upsert(menuRows, {onConflict:'id'}),
    sbClient.from('genka_ingredients').upsert(ingRows, {onConflict:'name'}),
    sbClient.from('genka_stores').upsert(storeRows, {onConflict:'id'})
  ]).then(function(results){
    var hasError = results.some(function(r){ return r.error; });
    if(hasError){
      var errs = results.filter(function(r){return r.error;}).map(function(r){return r.error.message;});
      console.error('Supabase sync error:', errs);
      setSyncStatus('error');
    } else {
      setSyncStatus('ok');
      localStorage.setItem('genka_v8_lastSync', new Date().toLocaleString('ja-JP'));
      updateLastSaveInfo();
    }
    syncPending = false;
  }).catch(function(err){
    console.error('Supabase sync catch:', err);
    setSyncStatus('error');
    syncPending = false;
  });
}

// setSyncStatus: 上部に定義済み

async function loadFromFirestore(){
  if(!sbClient){
    setSyncStatus('error');
    renderStoreGrid(); updateLastSaveInfo(); return;
  }
  setSyncStatus('loading');
  try {
    var [menuRes, ingRes, storeRes] = await Promise.all([
      sbClient.from('genka_menus').select('*'),
      sbClient.from('genka_ingredients').select('*'),
      sbClient.from('genka_stores').select('id,name,color')
    ]);

    var isFirstTime=(!menuRes.error&&menuRes.data&&menuRes.data.length===0);
    if(!menuRes.error && menuRes.data && menuRes.data.length > 0){
      menus = menuRes.data.map(function(r){
        return {
          id: r.id, storeId: r.store_id, name: r.name, cat: r.cat,
          menuType: r.menu_type, sell: r.sell, cost: r.cost, rate: r.rate,
          steps: r.steps, prepwork: r.prepwork, ytLink: r.yt_link,
          memo: r.memo, img: r.img,
          ings: r.ings||[], recipeImgs: r.recipe_imgs||[], stepImgs: r.step_imgs||[]
        };
      });
    }
    if(!ingRes.error && ingRes.data && ingRes.data.length > 0){
      ingMaster = ingRes.data.map(function(r){
        return {name:r.name, supplier:r.supplier, unit:r.unit, pQty:r.p_qty, pPrice:r.p_price, lossRate:r.loss_rate};
      });
    }
    if(!storeRes.error && storeRes.data && storeRes.data.length > 0){
      // ロゴはlocalStorageから補完
      storeRes.data.forEach(function(r){
        var existing = stores.find(function(s){return s.id===r.id;});
        var logo = existing ? existing.logo : '';
        // DEFAULT_STORESからも確認
        var def = DEFAULT_STORES.find(function(s){return s.id===r.id;});
        if(!logo && def) logo = def.logo||'';
        r.logo = logo;
      });
      stores = storeRes.data;
    }
    // ロゴ補完（DEFAULT_STORESから）
    stores.forEach(function(s){
      if(!s.logo){ var def=DEFAULT_STORES.find(function(d){return d.id===s.id;}); if(def&&def.logo) s.logo=def.logo; }
    });

    localStorage.setItem('genka_v8_menus',  JSON.stringify(menus));
    localStorage.setItem('genka_v8_ings',   JSON.stringify(ingMaster));
    localStorage.setItem('genka_v8_stores', JSON.stringify(stores));
    if(isFirstTime){setSyncStatus('error');setTimeout(showFirstUploadBanner,800);}else{localStorage.setItem('genka_v8_lastSync',new Date().toLocaleString('ja-JP'));setSyncStatus('ok');try{toast('☁️ Supabaseから読込完了（'+menus.length+'品）');}catch(e){}}
  } catch(err) {
    try{setSyncStatus('error');}catch(e){}

  }

  try{ updateLastSaveInfo(); }catch(e){}
}

async function runFirstUpload(){
  var btn=document.getElementById('first-upload-btn'),prog=document.getElementById('upload-progress');
  if(btn){btn.disabled=true;btn.textContent='⏳ アップロード中…';}
  if(prog){prog.style.display='block';prog.textContent='送信開始…';}
  if(!sbClient){toast('❌ Supabase未接続');return;}
  try{
    if(prog)prog.textContent='🏪 店舗 (1/3)';
    var sr=stores.map(function(s){return{id:s.id,name:s.name||'',color:s.color||'#f0a500',categories:s.categories||[],updated_at:new Date().toISOString()};});
    var r1=await sbClient.from('genka_stores').upsert(sr,{onConflict:'id'});
    if(r1.error)throw r1.error;
    if(prog)prog.textContent='🛒 食材'+ingMaster.length+'件 (2/3)';
    var ir=ingMaster.map(function(i){return{name:i.name||'',supplier:i.supplier||'',unit:i.unit||'g',p_qty:i.pQty||'',p_price:i.pPrice||'',loss_rate:i.lossRate||'',updated_at:new Date().toISOString()};});
    for(var c=0;c<ir.length;c+=50){var r2=await sbClient.from('genka_ingredients').upsert(ir.slice(c,c+50),{onConflict:'name'});if(r2.error)throw r2.error;if(prog)prog.textContent='🛒 食材'+Math.min((c+1)*50,ir.length)+'/'+ir.length+'件…';}
    if(prog)prog.textContent='🍽️ メニュー'+menus.length+'品 (3/3)';
    var mr=menus.map(function(m){return{id:String(m.id),store_id:m.storeId||'',name:m.name||'',cat:m.cat||'',menu_type:m.menuType||'recipe',sell:parseFloat(m.sell)||0,cost:parseFloat(m.cost)||0,rate:parseFloat(m.rate)||0,steps:m.steps||'',prepwork:m.prepwork||'',yt_link:m.ytLink||'',memo:m.memo||'',img_url:m.imgUrl||m.img||'',ings:m.ings||[],updated_at:new Date().toISOString()};});
    for(var c=0;c<mr.length;c+=20){var r3=await sbClient.from('genka_menus').upsert(mr.slice(c,c+20),{onConflict:'id'});if(r3.error)throw r3.error;if(prog)prog.textContent='🍽️ メニュー'+Math.min((c+1)*20,mr.length)+'/'+mr.length+'品…';}
    localStorage.setItem('genka_v8_lastSync',new Date().toLocaleString('ja-JP'));
    setSyncStatus('ok');updateLastSaveInfo();
    if(prog)prog.innerHTML='<div style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:10px;text-align:center"><div style="font-weight:700;color:var(--good)">✅ アップロード完了！</div><div style="font-size:11px;color:var(--muted);margin-top:2px">店舗'+sr.length+'件 ／ 食材'+ir.length+'件 ／ メニュー'+mr.length+'品</div></div>';
    setTimeout(function(){var b=document.getElementById('first-upload-banner');if(b)b.remove();},3000);
  }catch(err){console.error(err);if(prog)prog.textContent='❌ エラー: '+String(err.message||err);if(btn){btn.disabled=false;btn.textContent='🔄 再試行';}}
}
function manualSync(){var b=document.getElementById('first-upload-banner');if(b)b.remove();showFirstUploadBanner();setTimeout(runFirstUpload,100);}

// ユーティリティ
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function menuById(id){return menus.find(function(m){return String(m.id)===String(id);});}
function getMasterIng(name){return ingMaster.find(function(m){return m.name===name;});}

function calcIngCost(ings){
  var total=0;
  (ings||[]).forEach(function(ing){
    var pQty=parseFloat(ing.pQty)||0,pPrice=parseFloat(ing.pPrice)||0,uQty=parseFloat(ing.uQty)||0;
    var master=getMasterIng(ing.name);
    if(master){var mp=parseFloat(master.pQty)||0,mpr=parseFloat(master.pPrice)||0;if(mp>0&&mpr>0){pQty=mp;pPrice=mpr;}}
    if(pQty>0&&pPrice>0&&uQty>0){
      var lossRate=0;
      if(master&&parseFloat(master.lossRate)>0)lossRate=parseFloat(master.lossRate);
      else if(parseFloat(ing.lossRate)>0)lossRate=parseFloat(ing.lossRate);
      total+=pPrice/pQty*uQty*(lossRate>0?1/(1-lossRate/100):1);
    }
  });
  return Math.round(total*10)/10;
}
function calcRate(cost,sell){return(sell>0&&cost>0)?Math.round(cost/sell*1000)/10:0;}

function renderCatBar(){
  var bar=document.getElementById('cat-bar');if(!bar)return;
  var sm=menus.filter(function(m){
    if(m.storeId!==curStoreId)return false;
    if(curMenuType==='prepwork')return !!(m.prepwork||'').trim()||(m.menuType==='prepwork');
    return m.menuType!=='prepwork';
  });
  var cats=['all'];
  sm.forEach(function(m){if(m.cat&&cats.indexOf(m.cat)<0)cats.push(m.cat);});
  var s=stores.find(function(x){return x.id===curStoreId;}),color=s?s.color:'var(--accent)';
  bar.innerHTML=cats.map(function(c){
    var cnt=c==='all'?sm.length:sm.filter(function(m){return m.cat===c;}).length;
    var active=c===curCat;
    return '<button class="cat-btn'+(active?' active':'')+'" '+(active?'style="background:'+color+';color:#fff;border-color:'+color+';"':'')+' onclick="setCat(\''+esc(c)+'\')">'+
      (c==='all'?'🍽️ すべて ':esc(c))+' '+cnt+'</button>';
  }).join('');
}

function setCat(cat){curCat=cat;renderCatBar();renderMenuGrid();}

function renderMenuGrid(){
  var grid=document.getElementById('menu-grid');if(!grid)return;
  var q=(document.getElementById('search-inp')||{value:''}).value.toLowerCase();
  var list=menus.filter(function(m){
    if(m.storeId!==curStoreId)return false;
    if(curMenuType==='prepwork'){if(!((m.prepwork||'').trim())&&m.menuType!=='prepwork')return false;}
    else{if(m.menuType==='prepwork')return false;}
    if(curCat!=='all'&&m.cat!==curCat)return false;
    if(q&&m.name.toLowerCase().indexOf(q)<0)return false;
    return true;
  });
  var s=stores.find(function(x){return x.id===curStoreId;});
  if(list.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted)">メニューがありません</div>';return;}
  grid.innerHTML=list.map(function(m){
    var cost=calcIngCost(m.ings),sell=parseFloat(m.sell)||0;
    var rate=sell>0&&cost>0?Math.round(cost/sell*1000)/10:0;
    var rc=rate>0?(rate<=30?'var(--good)':rate<=40?'var(--warn)':'var(--bad)'):'var(--muted)';
    var img=m.img?'<img src="'+m.img+'" style="width:100%;height:100%;object-fit:cover;">':'<div style="font-size:40px;display:flex;align-items:center;justify-content:center;height:100%">🍽️</div>';
    return '<div class="menu-card" onclick="openDetail(\''+String(m.id)+'\')">'+
      '<div class="mc-thumb">'+img+'</div>'+
      '<div class="mc-body"><div class="mc-name">'+esc(m.name)+'</div>'+
      '<div class="mc-meta">'+(sell>0?'<span class="mc-sell">¥'+sell.toLocaleString()+'</span>':'<span class="mc-sell" style="color:var(--muted)">売価未設定</span>')+(cost>0?'<span style="font-size:11px;color:var(--muted)">原価¥'+cost+'</span>':'')+'</div>'+
      (rate>0?'<div style="height:4px;background:var(--card2);border-radius:2px;margin-top:6px"><div style="height:100%;width:'+Math.min(rate,100)+'%;background:'+rc+';border-radius:2px"></div></div>':'')+ 
      (rate>0?'<div style="font-size:10px;color:'+rc+';margin-top:2px">原価率 '+rate+'%</div>':'')+
      '</div></div>';
  }).join('');

function extractSteps(m){
  var raw=(m.steps||m.memo||m.recipe||'').trim();if(!raw)return[];
  raw=raw.replace(/([①②③④⑤⑥⑦⑧⑨⑩])/g,'\n$1');
  return raw.split('\n').map(function(s){return s.trim();}).filter(Boolean);
}

function renderDetail(m){
  var dispCost=calcIngCost(m.ings), sell=parseFloat(m.sell)||0;
  var rate=dispCost>0&&sell>0?Math.round(dispCost/sell*1000)/10:0;
  var rc=rate>0?(rate<=30?'var(--good)':rate<=40?'var(--warn)':'var(--bad)'):'var(--muted)';
  var sellStr=sell>0?'¥'+sell.toLocaleString():'未設定';

  var imgSrc=m.imgUrl||m.img||'';

  // ── KPIカード ──

    '<div style="display:grid;grid-template-columns:1fr 1fr'+(rate>0?' 1fr':'')+';;gap:10px;padding:16px 16px 0">'+

      '</div>'+

        '<div style="font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.5px">食材原価</div>'+
        '<div style="font-size:22px;font-weight:900;color:var(--text)">'+costStr+'</div>'+
        (sell>0&&dispCost>0?'<div style="font-size:10px;color:var(--muted);margin-top:4px">粗利 ¥'+(sell-dispCost).toLocaleString()+'</div>':'<div style="font-size:10px;color:var(--muted);margin-top:4px">&nbsp;</div>')+
      '</div>'+

        '</div>'
      :'')+
    '</div>';

  // ── 原価率バーゲージ ──
  var gaugeHtml='';
  if(rate>0){
    gaugeHtml=
      '<div style="margin:12px 16px 0;background:var(--card);border-radius:12px;padding:12px 14px">'+
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
          '<span style="font-size:11px;color:var(--muted)">原価率</span>'+

      '</div>'+

      var ca=(parseFloat(a.pPrice)||0)/(parseFloat(a.pQty)||1)*(parseFloat(a.uQty)||0);
      var cb=(parseFloat(b.pPrice)||0)/(parseFloat(b.pQty)||1)*(parseFloat(b.uQty)||0);
      return cb-ca;
    });
    var maxCost=0;
    sorted.forEach(function(ing){
      var c=(parseFloat(ing.pPrice)||0)/(parseFloat(ing.pQty)||1)*(parseFloat(ing.uQty)||0);
      if(c>maxCost)maxCost=c;
    });
    ingsHtml='<div style="margin:16px 16px 0">'+

      if(master&&parseFloat(master.pPrice)>0){pPrice=parseFloat(master.pPrice);pQty=parseFloat(master.pQty)||1;}
      var cost=pPrice/pQty*uQty;
      var pct=total>0?Math.round(cost/total*100):0;
      var barW=maxCost>0?Math.round(cost/maxCost*100):0;
      var unitCost=pQty>0?Math.round(pPrice/pQty*100)/100:0;
      ingsHtml+=
        '<div style="background:var(--card);border-radius:12px;padding:12px 14px;margin-bottom:8px">'+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'+

              '<div style="font-size:11px;color:var(--muted);margin-top:2px">'+
                (uQty>0?esc(String(uQty))+(ing.unit||'g')+'使用':'—')+
                (unitCost>0?' · ¥'+unitCost+'/'+(ing.unit||'g'):'')+ 
              '</div>'+
            '</div>'+
            '<div style="text-align:right">'+
              '<div style="font-size:16px;font-weight:700;color:var(--accent)">¥'+Math.round(cost)+'</div>'+
              '<div style="font-size:11px;color:var(--muted)">'+(pct>0?pct+'%':'—')+'</div>'+
            '</div>'+
          '</div>'+
          '<div style="height:4px;background:var(--card2);border-radius:2px">'+
            '<div style="height:100%;width:'+barW+'%;background:linear-gradient(90deg,var(--accent),#ff6b35);border-radius:2px;transition:width .3s"></div>'+
          '</div>'+
        '</div>';
    });
    ingsHtml+=
      '<div style="background:linear-gradient(135deg,var(--accent)22,var(--accent)11);border:1px solid var(--accent)44;border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center;margin-top:4px">'+
        '<div style="font-size:13px;font-weight:700;color:var(--accent)">合計食材原価</div>'+
        '<div style="font-size:20px;font-weight:900;color:var(--accent)">¥'+total+'</div>'+
      '</div>'+
    '</div>';
  }

  // ── YouTube ──
  var ytHtml=m.ytLink?
    '<div style="margin:16px 16px 0">'+
      '<button onclick="window.open(\''+esc(m.ytLink)+'\',\'_blank\')" style="width:100%;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.3);border-radius:12px;padding:14px;color:#ff4444;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px">'+
        '<span style="font-size:20px">▶</span> YouTubeでレシピ動画を見る'+
      '</button>'+
    '</div>':
    '';

  document.getElementById('det-body').innerHTML=
    kpiHtml+gaugeHtml+imgHtml+stepsHtml+ingsHtml+ytHtml+
    '<div style="height:40px"></div>';
}

function buildIngRow(ing,i){
  var opts=ingMaster.map(function(m){return'<option value="'+esc(m.name)+'"'+(m.name===ing.name?' selected':'')+'>'+esc(m.name)+'</option>';}).join('');
  return'<div class="ing-row-edit" id="ing-row-'+i+'">'+
    '<div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><select class="field-inp" id="ie-name-'+i+'" style="flex:1;min-width:0" onchange="onIngSelect('+i+')"><option value="">-- 選択 --</option>'+opts+'</select><button onclick="removeIngRow('+i+')" style="background:none;border:none;color:var(--bad);font-size:18px;cursor:pointer;padding:0 4px">×</button></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;font-size:11px">'+
      '<div><div style="color:var(--muted)">使用量</div><input class="field-inp" id="ie-uqty-'+i+'" type="number" value="'+esc(ing.uQty||'')+'" style="padding:6px 8px" oninput="updateEditCalc()"></div>'+
      '<div><div style="color:var(--muted)">単位</div><input class="field-inp" id="ie-unit-'+i+'" value="'+esc(ing.unit||'g')+'" style="padding:6px 8px"></div>'+
      '<div><div style="color:var(--muted)">仕入量</div><input class="field-inp" id="ie-pqty-'+i+'" type="number" value="'+esc(ing.pQty||'')+'" style="padding:6px 8px" oninput="updateEditCalc()"></div>'+
      '<div><div style="color:var(--muted)">仕入価格</div><input class="field-inp" id="ie-pprice-'+i+'" type="number" value="'+esc(ing.pPrice||'')+'" style="padding:6px 8px" oninput="updateEditCalc()"></div>'+
    '</div></div>';
}

function onIngSelect(i){
  var name=(document.getElementById('ie-name-'+i)||{value:''}).value;
  var master=getMasterIng(name);if(!master)return;
  var pq=document.getElementById('ie-pqty-'+i),pp=document.getElementById('ie-pprice-'+i),u=document.getElementById('ie-unit-'+i);
  if(pq&&master.pQty)pq.value=master.pQty;if(pp&&master.pPrice)pp.value=master.pPrice;if(u&&master.unit)u.value=master.unit;
  updateEditCalc();
}

function addIngRow(){
  editIngRows.push({id:'new_'+Date.now(),name:'',unit:'g',pQty:'',pPrice:'',uQty:''});
  var cont=document.getElementById('ing-rows');if(!cont)return;
  cont.insertAdjacentHTML('beforeend',buildIngRow(editIngRows[editIngRows.length-1],editIngRows.length-1));
}

function removeIngRow(i){editIngRows[i]=null;var row=document.getElementById('ing-row-'+i);if(row)row.style.display='none';updateEditCalc();}

function updateEditCalc(){updateEditSellPreview();}

function updateEditSellPreview(){
  var el=document.getElementById('sell-preview');if(!el)return;
  var total=0;
  (editIngRows||[]).forEach(function(_,i){
    if(!_)return;
    var name=(document.getElementById('ie-name-'+i)||{value:''}).value;
    var master=getMasterIng(name);
    var pQty=parseFloat((document.getElementById('ie-pqty-'+i)||{value:''}).value)||0;
    var pPrice=parseFloat((document.getElementById('ie-pprice-'+i)||{value:''}).value)||0;
    var uQty=parseFloat((document.getElementById('ie-uqty-'+i)||{value:''}).value)||0;
    if(master&&parseFloat(master.pQty)>0&&parseFloat(master.pPrice)>0){pQty=parseFloat(master.pQty);pPrice=parseFloat(master.pPrice);}
    if(pQty>0&&pPrice>0&&uQty>0)total+=pPrice/pQty*uQty;
  });
  total=Math.round(total*10)/10;
  var sell=parseFloat((document.getElementById('ef-sell')||{value:''}).value)||0;
  if(total>0){var sug=Math.ceil(total/0.30/10)*10;if(sell>0){var rate=Math.round(total/sell*1000)/10;var rc=rate<=30?'var(--good)':rate<=40?'var(--warn)':'var(--bad)';el.innerHTML='原価¥'+total+' → 原価率 <b style="color:'+rc+'">'+rate+'%</b>　推奨売価: <b>¥'+sug+'</b>';}else{el.innerHTML='原価¥'+total+' → 目標30%の推奨売価: <b>¥'+sug+'</b>';}}else{el.innerHTML='';}
}

function loadMenuImg(input){
  if(!input.files||!input.files[0])return;
  var file=input.files[0];
  window._pendingImgFile=file;
  var reader=new FileReader();
  reader.onload=function(e){
    var outer=document.getElementById('ef-img-outer');
    if(!outer)return;
    outer.innerHTML='<div style="position:relative"><img id="ef-img-preview" src="'+e.target.result+'" style="width:100%;max-height:200px;object-fit:cover;border-radius:10px;display:block"><button type="button" onclick="clearMenuImg()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.7);border:none;border-radius:50%;width:28px;height:28px;color:#fff;font-size:16px;cursor:pointer">x</button></div><div style="font-size:11px;color:var(--accent);margin-top:6px">'+esc(file.name)+' — 「保存する」を押すとクラウドにアップロードされます</div>';

}

function clearMenuImg(){

function getExistingImgUrl(){
  // 既にStorageのURL(http)が入っている場合のみ返す
  // base64(data:)は返さない（Storageアップロード後に更新される）
  var img=document.getElementById('ef-img-preview');
  if(!img||img.tagName!=='IMG') return '';
  var src=img.src||'';
  return src.startsWith('http')?src:''; // http:// or https:// のURLのみ
}


function getEditImg(){
  var img=document.getElementById('ef-img-preview');

}

function saveMenu(){
  var name=(document.getElementById('ef-name')||{value:''}).value.trim();
  if(!name){toast('⚠️ メニュー名を入力してください');return;}
  var idx=menus.findIndex(function(m){return String(m.id)===String(editMenuId);});
  var ingData=[];
  (editIngRows||[]).forEach(function(ing,i){
    if(!ing)return;
    var n=(document.getElementById('ie-name-'+i)||{value:''}).value;if(!n)return;
    ingData.push({id:ing.id||('i'+Date.now()+'_'+i),name:n,unit:(document.getElementById('ie-unit-'+i)||{value:'g'}).value||'g',pQty:(document.getElementById('ie-pqty-'+i)||{value:''}).value,pPrice:(document.getElementById('ie-pprice-'+i)||{value:''}).value,uQty:(document.getElementById('ie-uqty-'+i)||{value:''}).value});
  });
  var menuImg=getExistingImgUrl(); // 既存URLのみ（新規はStorage経由）
  var cost=calcIngCost(ingData),sell=parseFloat((document.getElementById('ef-sell')||{value:''}).value)||0;
  var menuData={name:name,cat:(document.getElementById('ef-cat')||{value:''}).value.trim(),menuType:(document.getElementById('ef-menutype')||{checked:false}).checked?'prepwork':'recipe',sell:sell,cost:cost,rate:calcRate(cost,sell),steps:(document.getElementById('ef-steps')||{value:''}).value,prepwork:(document.getElementById('ef-prepwork')||{value:''}).value,ytLink:(document.getElementById('ef-yt')||{value:''}).value,ings:ingData,img:menuImg,imgUrl:menuImg};
  var newId=(idx>=0)?menus[idx].id:Date.now();
  if(idx>=0){Object.assign(menus[idx],menuData);}
  else{menus.push(Object.assign({id:newId,storeId:curStoreId,img:menuImg,imgUrl:menuImg,recipeImgs:[],stepImgs:[],memo:''},menuData));}
  var _pf=window._pendingImgFile||null;
  window._pendingImgFile=null;
  save();
  closeEdit();
  renderMenuGrid();renderCatBar();renderStoreGrid();
  toast('✅ 保存しました');
  if(_pf&&sbClient){
    (async function(mid,file){
      try{
        var ext=(file.name||'img').split('.').pop()||'jpg';
        var path='menus/'+String(mid)+'_'+Date.now()+'.'+ext;
        var res=await sbClient.storage.from('genka-images').upload(path,file,{upsert:true,contentType:file.type});
        if(res.error){toast('⚠️ 画像アップロード失敗');return;}
        var url=sbClient.storage.from('genka-images').getPublicUrl(path).data.publicUrl;
        var m=menuById(String(mid));if(m){m.imgUrl=url;m.img=url;}
        save();renderMenuGrid();renderStoreGrid();
        toast('🖼️ 画像をクラウドに保存しました！');
      }catch(e){console.error(e);}
    })(newId,_pf);
  }
}

function deleteMenu(){
  if(!curMenuId)return;
  menus=menus.filter(function(m){return String(m.id)!==String(curMenuId);});
  save();closeDetail();renderMenuGrid();renderCatBar();renderStoreGrid();
  toast('🗑️ 削除しました');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 食材マスター
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderMaster(){
  var q=(document.getElementById('master-search')||{value:''}).value.toLowerCase();
  var list=q?ingMaster.filter(function(i){return i.name.toLowerCase().indexOf(q)>=0;}):ingMaster;
  var cnt=document.getElementById('master-cnt');if(cnt)cnt.textContent=list.length+'件';
  var el=document.getElementById('master-list');if(!el)return;
  var html='';
  list.forEach(function(ing){
    var up=parseFloat(ing.pQty)>0&&parseFloat(ing.pPrice)>0?Math.round(parseFloat(ing.pPrice)/parseFloat(ing.pQty)*100)/100:0;
    var ls=parseFloat(ing.lossRate)>0?ing.lossRate+'%ロス':'';
    html+='<div class="master-item" data-ing-name="'+esc(ing.name)+'" onclick="editMasterIng(this.dataset.ingName)">'+
      '<div style="flex:1"><div class="mi-name">'+esc(ing.name)+'</div><div style="font-size:11px;color:var(--muted)">'+esc(ing.supplier||'')+(ls?' <span style="color:var(--warn)">'+ls+'</span>':'')+'</div></div>'+
      '<div style="text-align:right"><div class="mi-price">'+(up>0?'¥'+up+'/'+esc(ing.unit||''):'—')+'</div><div class="mi-detail">'+(ing.pPrice&&ing.pQty?'¥'+esc(ing.pPrice)+'/'+esc(ing.pQty)+esc(ing.unit||''):'価格未入力')+'</div></div>'+
      '<div style="margin-left:8px;color:var(--muted);font-size:16px">›</div></div>';
  });
  el.innerHTML=html;
}

function editMasterIng(name){
  var ing=ingMaster.find(function(m){return m.name===name;});if(!ing)return;
  document.body.insertAdjacentHTML('beforeend',
    '<div style="background:var(--surface);position:fixed;top:0;left:0;right:0;bottom:0;z-index:400;overflow-y:auto;padding:20px 16px" id="master-edit-overlay">'+
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px"><button onclick="document.getElementById(\\"master-edit-overlay\\").remove()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">←</button><div style="font-size:16px;font-weight:700">食材を編集</div></div>'+
    '<div class="field-lbl">食材名</div><input class="field-inp" id="me-name" value="'+esc(ing.name||'')+'" readonly style="opacity:.6">'+
    '<div class="field-lbl">仕入先</div><input class="field-inp" id="me-supplier" value="'+esc(ing.supplier||'')+'" placeholder="仕入先名">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div><div class="field-lbl">仕入量</div><input class="field-inp" id="me-pqty" type="number" value="'+esc(ing.pQty||'')+'" oninput="updateMasterPreview()"></div><div><div class="field-lbl">単位</div><input class="field-inp" id="me-unit" value="'+esc(ing.unit||'g')+'" oninput="updateMasterPreview()"></div></div>'+
    '<div class="field-lbl">仕入価格（¥）</div><input class="field-inp" id="me-pprice" type="number" value="'+esc(ing.pPrice||'')+'" oninput="updateMasterPreview()">'+
    '<div class="field-lbl">ロス率（%）</div><input class="field-inp" id="me-loss" type="number" value="'+esc(ing.lossRate||'')+'" placeholder="例: 20" oninput="updateMasterPreview()">'+
    '<div id="me-preview" style="background:var(--card);border-radius:10px;padding:12px;margin-top:12px;font-size:13px;color:var(--accent);min-height:40px"></div>'+
    '<div style="display:flex;gap:10px;margin-top:20px;padding-bottom:40px"><button onclick="document.getElementById(\\"master-edit-overlay\\").remove()" class="btn-cancel">キャンセル</button><button data-ing-name="'+esc(name)+'" onclick="saveMasterIng(this.dataset.ingName)" class="btn-save-menu" style="flex:1">💾 保存して全メニュー反映</button></div>'+
    '</div>');
  updateMasterPreview();
}

function updateMasterPreview(){
  var pQty=parseFloat((document.getElementById('me-pqty')||{value:''}).value)||0;
  var pPrice=parseFloat((document.getElementById('me-pprice')||{value:''}).value)||0;
  var unit=(document.getElementById('me-unit')||{value:'g'}).value||'g';
  var loss=parseFloat((document.getElementById('me-loss')||{value:''}).value)||0;
  var el=document.getElementById('me-preview');if(!el)return;
  if(pQty>0&&pPrice>0){var up=Math.round(pPrice/pQty*100)/100,f=loss>0?1/(1-loss/100):1,ep=Math.round(up*f*100)/100;el.innerHTML='<div>単価: <b>¥'+up+'/'+esc(unit)+'</b></div>'+(loss>0?'<div style="margin-top:4px;color:var(--warn)">ロス考慮後: <b>¥'+ep+'/'+esc(unit)+'</b></div>':'');}
  else{el.innerHTML='<span style="color:var(--muted)">仕入量と価格を入力すると単価が表示されます</span>';}
}

function saveMasterIng(originalName){
  var idx=ingMaster.findIndex(function(m){return m.name===originalName;});if(idx<0)return;
  ingMaster[idx].supplier=(document.getElementById('me-supplier')||{value:''}).value.trim();
  ingMaster[idx].pQty=(document.getElementById('me-pqty')||{value:''}).value;
  ingMaster[idx].pPrice=(document.getElementById('me-pprice')||{value:''}).value;
  ingMaster[idx].unit=(document.getElementById('me-unit')||{value:'g'}).value||'g';
  ingMaster[idx].lossRate=(document.getElementById('me-loss')||{value:''}).value||'';
  ingMaster[idx].updatedAt=Date.now();
  var updated=0;
  menus.forEach(function(m){if((m.ings||[]).some(function(i){return i.name===originalName;})){m.cost=calcIngCost(m.ings);var sell=parseFloat(m.sell)||0;m.rate=(sell>0&&m.cost>0)?Math.round(m.cost/sell*1000)/10:m.rate;updated++;}});
  save();document.getElementById('master-edit-overlay').remove();renderMaster();
  toast('✅ 保存完了 — '+updated+'品のメニュー原価を再計算しました');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 市場AI チップ選択
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var allMarketChips=[];

function initMarketPage(){
  var vk=['キャベツ','レタス','トマト','にんじん','人参','たまねぎ','玉ねぎ','ねぎ','ネギ','ゴーヤ','きゅうり','じゃがいも','大根','パパイヤ','もやし','アボカド','ピーマン','ほうれん草','ブロッコリー','白菜','ニラ','にら','ゴーヤー'];
  var shown=new Set();allMarketChips=[];
  ingMaster.forEach(function(ing){var n=ing.name||'';if(!shown.has(n)&&parseFloat(ing.pPrice)>0){shown.add(n);allMarketChips.push(n);}});
  allMarketChips.sort(function(a,b){return(vk.some(function(k){return a.indexOf(k)>=0;})?0:1)-(vk.some(function(k){return b.indexOf(k)>=0;})?0:1);});
  if(selectedIngs.length===0){selectedIngs=allMarketChips.filter(function(n){return vk.some(function(k){return n.indexOf(k)>=0;});}).slice(0,10);}
  var si=document.getElementById('market-ing-search');if(si)si.value='';
  renderMarketChips('');
}

function renderMarketChips(q){
  var el=document.getElementById('market-ing-select'),cntEl=document.getElementById('market-sel-count');
  if(!el)return;
  var list=q?allMarketChips.filter(function(n){return n.indexOf(q)>=0;}):allMarketChips;
  el.innerHTML=list.map(function(name){var sel=selectedIngs.indexOf(name)>=0;return'<span class="ing-chip'+(sel?' sel':'')+'" data-ing="'+esc(name)+'">'+esc(name)+'</span>';}).join('');
  if(cntEl)cntEl.textContent=selectedIngs.length?selectedIngs.length+'品目を選択中':'食材をタップして選択してください';
}

function handleChipTouch(e){var t=e.target;while(t&&!t.classList.contains('ing-chip'))t=t.parentElement;if(!t)return;e.preventDefault();doToggleChip(t);}
function handleChipClick(e){var t=e.target;while(t&&!t.classList.contains('ing-chip'))t=t.parentElement;if(!t)return;doToggleChip(t);}
function doToggleChip(chip){var name=chip.getAttribute('data-ing')||'';if(!name)return;var idx=selectedIngs.indexOf(name);if(idx>=0){selectedIngs.splice(idx,1);chip.classList.remove('sel');}else{selectedIngs.push(name);chip.classList.add('sel');}var cntEl=document.getElementById('market-sel-count');if(cntEl)cntEl.textContent=selectedIngs.length+'品目を選択中';}
function toggleIngChip(n,b){}


function updateIngPrice(name,newPPrice){
  var idx=ingMaster.findIndex(function(m){return m.name===name;}); if(idx<0){ toast('❌ 食材が見つかりません'); return; }
  ingMaster[idx].pPrice=String(newPPrice); ingMaster[idx].updatedAt=Date.now();
  var updated=0;
  menus.forEach(function(m){ if((m.ings||[]).some(function(i){return i.name===name;})){ m.cost=calcIngCost(m.ings); var sell=parseFloat(m.sell)||0; m.rate=sell>0&&m.cost>0?Math.round(m.cost/sell*1000)/10:m.rate; updated++; } });
  save(); toast('✅ '+name+' を更新。'+updated+'品のメニュー原価を再計算しました');
  event.target.textContent='✅ 更新済み'; event.target.disabled=true; event.target.style.opacity='.5';
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 市場AI 実行
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var selectedIngs=[], lastMarketResult=null;

async function runMarketCheck(){
  if(selectedIngs.length===0){ toast('⚠️ 食材を1つ以上選択してください'); return; }
  var btn=document.getElementById('market-run-btn'), btnIcon=document.getElementById('market-btn-icon'), btnText=document.getElementById('market-btn-text');
  var resultEl=document.getElementById('market-result');
  btn.disabled=true; btn.style.opacity='.7'; btnText.textContent='AI が市場データを取得中…'; btnIcon.textContent='⏳';
  resultEl.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)"><div style="font-size:32px;margin-bottom:12px">🔍</div><div>市場データを解析中…</div></div>';
  var useOkinawa=document.getElementById('area-okinawa').checked, useTokyo=document.getElementById('area-tokyo').checked;
  var appPrices={};
  ingMaster.forEach(function(ing){ if(selectedIngs.indexOf(ing.name)>=0&&parseFloat(ing.pPrice)>0){ appPrices[ing.name]={pPrice:parseFloat(ing.pPrice),pQty:parseFloat(ing.pQty)||1,unit:ing.unit||'g'}; } });
  var today=new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'});
  var areas=[]; if(useTokyo) areas.push('東京・千葉（豊洲市場・関東圏）'); if(useOkinawa) areas.push('沖縄（那覇市場・沖縄県）');
  var prompt='今日は'+today+'です。以下の野菜・食材について、'+areas.join('と')+'の現在の【業務用卸売価格】を調べてください。沖縄は本土より野菜が高い傾向があります。\n\n調べる食材：'+selectedIngs.join('、')+'\n\n以下のJSON形式のみで回答（余分なテキスト不要）:\n{"date":"調査日","items":[{"name":"食材名","tokyo_price_per_kg":数値,"okinawa_price_per_kg":数値,"okinawa_premium_pct":数値,"trend":"↑高値/↓値下がり/→平年並","reason":"短い理由（20字以内）"}],"summary":"全体市況50字以内"}';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,tools:[{"type":"web_search_20250305","name":"web_search"}],messages:[{role:'user',content:prompt}]})});
    var data=await resp.json();
    var jsonText=''; (data.content||[]).forEach(function(block){ if(block.type==='text') jsonText+=block.text; });
    var clean=jsonText.replace(/```json|```/g,'').trim();
    var parsed=JSON.parse(clean);
    lastMarketResult=parsed; renderMarketResult(parsed,appPrices,useOkinawa,useTokyo);
  }catch(err){ resultEl.innerHTML='<div style="background:rgba(239,68,68,.1);border-radius:12px;padding:16px;color:var(--bad)">❌ 取得エラー: '+esc(String(err))+'</div>'; }
  btn.disabled=false; btn.style.opacity='1'; btnText.textContent='もう一度チェック'; btnIcon.textContent='🔄';
}

function renderMarketResult(data,appPrices,useOkinawa,useTokyo){
  var el=document.getElementById('market-result'), items=data.items||[], alertCount=0;
  var html='<div class="market-summary"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">📅 '+esc(data.date||'')+'  AI調査結果</div><div style="font-size:13px;line-height:1.6">'+esc(data.summary||'')+'</div></div>';
  items.forEach(function(item){
    var app=appPrices[item.name], appPerKg=app?Math.round(app.pPrice/app.pQty*1000):null;
    var tokyoP=item.tokyo_price_per_kg, okiP=item.okinawa_price_per_kg, mainP=useTokyo?tokyoP:okiP;
    var alertHtml='';
    if(appPerKg&&mainP){ var diff=Math.round((mainP-appPerKg)/appPerKg*100); if(diff>15){alertHtml='<span class="alert-badge">+'+diff+'% 値上がり</span>';alertCount++;}else if(diff<-15){alertHtml='<span class="ok-badge">'+diff+'% 値下がり</span>';} }
    html+='<div class="market-card"><div style="display:flex;align-items:center;margin-bottom:10px"><div class="market-card-name">'+esc(item.name)+'</div><span style="margin-left:6px;font-size:16px">'+esc(item.trend||'')+'</span>'+alertHtml+'</div><div style="font-size:11px;color:var(--muted);margin-bottom:6px">'+esc(item.reason||'')+'</div>';
    if(useTokyo&&tokyoP){ var appClass=appPerKg&&Math.abs(tokyoP-appPerKg)/appPerKg>0.15?(tokyoP>appPerKg?'diff-up':'diff-down'):'diff-ok'; var appDiff=appPerKg?(tokyoP>appPerKg?'+':'')+Math.round((tokyoP-appPerKg)/appPerKg*100)+'%':''; html+='<div class="price-row"><span class="price-area">🗼 東京・千葉</span><div style="display:flex;align-items:center;gap:8px"><span class="price-val">¥'+tokyoP+'/kg</span>'+(appDiff?'<span class="price-diff '+appClass+'">'+appDiff+'</span>':'')+'</div></div>'; }
    if(useOkinawa&&okiP){ var premTxt=item.okinawa_premium_pct>0?'+'+item.okinawa_premium_pct+'%':''; html+='<div class="price-row"><span class="price-area">🏝️ 沖縄</span><div style="display:flex;align-items:center;gap:8px"><span class="price-val">¥'+okiP+'/kg</span>'+(premTxt?'<span class="price-diff diff-up">東京比'+premTxt+'</span>':'')+'</div></div>'; }
    if(appPerKg){ html+='<div class="price-row" style="background:rgba(240,165,0,.05);border-radius:8px;margin-top:4px;padding:8px 4px"><span style="font-size:12px;color:var(--accent);font-weight:600">📋 アプリ登録</span><span class="price-val" style="color:var(--accent)">¥'+appPerKg+'/kg</span></div>'; }
    if(mainP&&app){ var newP=Math.round(mainP*app.pQty/1000); html+='<button class="update-btn" style="margin-top:10px;width:100%" data-ing="'+esc(item.name)+'" data-price="'+newP+'" onclick="updateIngPrice(this.dataset.ing,parseInt(this.dataset.price))">💾 アプリ価格を市場価格に更新 (¥'+newP+'/'+app.pQty+app.unit+')</button>'; }
    html+='</div>';
  });
  if(alertCount>0) html='<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:12px;margin-bottom:12px;font-size:13px">⚠️ <b>'+alertCount+'品目</b>で15%以上の値上がりを検知しました。</div>'+html;
  el.innerHTML=html;
}
